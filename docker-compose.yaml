services:
  db:
    image: mysql:latest
    container_name: forumhub_db_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_super_secret
      MYSQL_DATABASE: forum_hub
      MYSQL_USER: forumhubusername
      MYSQL_PASSWORD: forumhubpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: